<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROck-Paper-Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <div class="container">
        <p  id='displaypara' style="text-align: center;">display</p>
       
        <div class="imagecontainer">
            <img src="rock.jpeg" id="rock" alt="Rock">
            <img src="paper.jpeg" id="paper" alt="Paper">
            <img src="scissors.jpeg" id="scissor" alt="scissor">
        </div>


        <div class="displaybox">
            <div class="leftdiv">
                <h4>User Scoring</h4>
                <p>Score: <span id="userscore">0</span></p>


            </div>
            <div class="rightdiv">
                <h4>Computer Scoring</h4>
                <p >Score: <span id="compscore">0</span></p>


            </div>
        </div>


        <div class="Result">
            <button id="btn">Result</button>
        </div>




    </div>


    <script src="script1.js"></script>


</body>
</html>
